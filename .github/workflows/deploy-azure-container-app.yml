name: Deploy Azure Container App

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/deploy-azure-container-app.yml"

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_CONTAINER_APP_NAME: ${{ vars.AZURE_CONTAINER_APP_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare image name
        run: |
          REPOSITORY_LC="${GITHUB_REPOSITORY,,}"
          echo "IMAGE=ghcr.io/${REPOSITORY_LC}/web:${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "IMAGE_LATEST=ghcr.io/${REPOSITORY_LC}/web:latest" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: docker build -f web/Dockerfile -t "$IMAGE" -t "$IMAGE_LATEST" web

      - name: Push image
        run: |
          docker push "$IMAGE"
          docker push "$IMAGE_LATEST"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy image to Container Apps
        run: |
          az containerapp update \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_CONTAINER_APP_NAME" \
            --image "$IMAGE"

      - name: Print app URL
        run: |
          FQDN="$(az containerapp show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_CONTAINER_APP_NAME" \
            --query properties.configuration.ingress.fqdn \
            --output tsv)"
          echo "https://${FQDN}"
